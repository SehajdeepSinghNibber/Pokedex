<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Pokédex</h1>

    <div class="search-box">
        <input id="search" type="text" placeholder="Enter name or number">
        <button onclick="searchPokemon()">Search</button>
    </div>

    <div class="card" id="card">

        <img id="pokemonImg">

        <h2 id="pokemonName"></h2>

        <p id="pokemonNumber"></p>

        <p id="pokemonTypes"></p>

        <p id="pokemonWeakness"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
